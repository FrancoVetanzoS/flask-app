<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Registro Orden de Produccion de Emulsion</title>
</head>
<body>
<div class="container">
    <h1>Registrar Orden de Producción de Emulsión</h1><br>
    <form method="POST">

        Lote:
        <input type="text" name="Lote" required><br><br>
        Codigo de Asfalto usado:
        <input type="text" name="Cod_MP"required><br><br>
        Tipo de Emulsion:
        <input type="text" name="Tipo" required><br><br>
        Fecha de Produccion:
        <input type="date" name="fecha" required><br><br>    

        <button type="submit">Guardar</button>
        <a href="{{ url_for('op') }}">
            <button type="button">Cancelar</button>
        </a>

    </form>
</div>
</body>
</html>
